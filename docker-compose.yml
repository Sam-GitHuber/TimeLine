# TimeLine local development stack (Phase 0).
# Three services that talk to each other on a private Docker network:
#   db       — PostgreSQL database
#   backend  — Django + DRF API (http://localhost:8000)
#   frontend — React + Vite dev server (http://localhost:5173)
#
# Values below use ${VAR:-default} so `docker compose up` works out of the box.
# Copy .env.example to .env to override any of them (e.g. a real secret key).

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-timeline}
      POSTGRES_USER: ${POSTGRES_USER:-timeline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timeline}
    volumes:
      # Named volume: database survives `docker compose down` (but not `-v`).
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # backend waits for this to pass before starting (see depends_on below).
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-timeline} -d ${POSTGRES_DB:-timeline}"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-timeline}
      POSTGRES_USER: ${POSTGRES_USER:-timeline}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-timeline}
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      DJANGO_DEBUG: ${DJANGO_DEBUG:-true}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-django-insecure-dev-only-key-change-me}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    volumes:
      # Mount source for live autoreload during development.
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      # Anonymous volume keeps the container's Linux node_modules, so the host's
      # (macOS) node_modules doesn't overlay it.
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
