{% autoescape on %}<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your TimeLine verification code</title>
</head>
{% comment %}
Email HTML is deliberately old-fashioned: table layout + inline styles, because
mail clients strip <style> blocks and ignore modern CSS. Colours are the design
system's warm "living line" palette (docs/design-system.md), hard-coded because
CSS variables don't survive email clients either.
{% endcomment %}
<body style="margin:0;padding:0;background-color:#FBFAF7;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#FBFAF7;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:440px;background-color:#FFFFFF;border:1px solid #ECE9E2;border-radius:16px;">
          <tr>
            <td style="padding:32px 32px 8px 32px;">
              <!-- Wordmark: the "living line" spine + accent node -->
              <table role="presentation" cellpadding="0" cellspacing="0">
                <tr>
                  <td style="vertical-align:middle;padding-right:8px;">
                    <div style="width:2px;height:22px;margin:0 auto;background-color:#DED9CF;border-radius:2px;position:relative;">
                      <div style="width:8px;height:8px;background-color:#1C8A6A;border-radius:50%;position:absolute;top:2px;left:-3px;"></div>
                    </div>
                  </td>
                  <td style="vertical-align:middle;font-family:Georgia,'Times New Roman',serif;font-size:20px;font-weight:bold;color:#1C1A16;letter-spacing:-0.02em;">
                    TimeLine
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 32px 0 32px;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.6;color:#57534B;">
              <p style="margin:0 0 16px 0;">{% if display_name %}Hi {{ display_name }},{% else %}Hi,{% endif %}</p>
              <p style="margin:0 0 8px 0;">Welcome to TimeLine. Enter this code to verify your email address:</p>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 8px 32px;">
              <div style="background-color:#E6F2ED;border-radius:12px;padding:20px;text-align:center;font-family:'SFMono-Regular',Menlo,Consolas,monospace;font-size:34px;font-weight:bold;letter-spacing:0.35em;color:#146650;">
                {{ code }}
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 0 32px;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;font-size:14px;line-height:1.6;color:#57534B;">
              <p style="margin:0 0 16px 0;">The code expires in {{ expiry_minutes }} minutes. Once your address is verified, your account still needs to be approved by the site owner before you can log in.</p>
            </td>
          </tr>
          <tr>
            <td style="padding:0 32px 28px 32px;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;font-size:13px;line-height:1.6;color:#928D83;border-top:1px solid #ECE9E2;">
              <p style="margin:16px 0 0 0;">If you didn't sign up for TimeLine, you can safely ignore this email — no account can be used until it's both verified and approved.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>{% endautoescape %}
