# CI — runs the automated test suites on every push and pull request.
#
# Two independent test jobs, matching the two apps in the repo:
#   backend  — Django tests against a real Postgres (same engine as prod, so we
#              don't get surprised by SQLite-only behaviour).
#   frontend — Vitest (React Testing Library).
#
# These job names ("backend", "frontend") are the required status checks for
# branch protection on main — see docs/phases/phase-2-accounts.md.
#
# Path filtering: a docs-only change (e.g. editing docs/**) shouldn't have to
# wait for the full test suites. A `changes` job detects which app folders were
# touched, and the `backend`/`frontend` jobs run only when their folder (or this
# workflow file) changed.
#
# WHY it's done this way and NOT with a top-level `on: paths:` filter: the two
# jobs are *required* status checks. If we filtered at the `on:` level, a
# docs-only change wouldn't trigger the workflow at all, so those required checks
# would never report and the PR would sit blocked ("Expected — waiting for status
# to be reported") forever. Instead the workflow always runs, and we skip the
# jobs with a job-level `if:`. A job skipped that way reports as "Skipped", which
# GitHub counts as a *passing* required check — so a docs PR goes green instantly
# while any code change still runs its suite. Editing this workflow runs BOTH.
name: CI

on: [push, pull_request]

jobs:
  # Detect which parts of the repo changed, so the expensive test jobs below can
  # be skipped when irrelevant. Not a required check itself — it just always runs.
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/main.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/main.yml'

  backend:
    needs: changes
    if: ${{ needs.changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: timeline
          POSTGRES_USER: timeline
          POSTGRES_PASSWORD: timeline
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the job runs.
        options: >-
          --health-cmd "pg_isready -U timeline -d timeline"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Point Django at the service container (exposed on localhost in CI).
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: timeline
      POSTGRES_USER: timeline
      POSTGRES_PASSWORD: timeline
      # DEBUG on so the throwaway dev secret key is used (the settings-hardening
      # test sets its own isolated env, so this doesn't affect it).
      DJANGO_DEBUG: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run migrations (sanity check)
        run: uv run python manage.py migrate --noinput

      - name: Run tests
        run: uv run python manage.py test

  frontend:
    needs: changes
    if: ${{ needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
