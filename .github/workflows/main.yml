# CI — runs the automated test suites on every push and pull request.
#
# Three independent jobs, matching the three apps in the repo:
#   backend  — Django tests against a real Postgres (same engine as prod, so we
#              don't get surprised by SQLite-only behaviour).
#   frontend — Vitest (React Testing Library).
#   mobile   — Jest + React Native Testing Library (the Expo app).
#
# The job names here ("backend", "frontend", "mobile", "semgrep") plus CodeQL's
# "Analyze (…)" jobs are the required status checks for branch protection on
# main — all must pass before a PR can merge.
name: CI

on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: timeline
          POSTGRES_USER: timeline
          POSTGRES_PASSWORD: timeline
        ports:
          - 5432:5432
        # Wait until Postgres is accepting connections before the job runs.
        options: >-
          --health-cmd "pg_isready -U timeline -d timeline"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      # Point Django at the service container (exposed on localhost in CI).
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_DB: timeline
      POSTGRES_USER: timeline
      POSTGRES_PASSWORD: timeline
      # DEBUG on so the throwaway dev secret key is used (the settings-hardening
      # test sets its own isolated env, so this doesn't affect it).
      DJANGO_DEBUG: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync --frozen

      # Lint + security scan before the tests so problems surface fast. These
      # ride inside the "backend" job, so they're covered by the existing
      # branch-protection requirement without adding a new required check.
      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Security scan (bandit)
        run: uv run bandit -c pyproject.toml -r api accounts config -q

      - name: Run migrations (sanity check)
        run: uv run python manage.py migrate --noinput

      - name: Run tests
        run: uv run python manage.py test

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npm run lint

      - name: Run tests
        run: npm test

  # mobile — the Expo (React Native) iOS/Android app. Jest + React Native
  # Testing Library, unit and component tests only.
  #
  # This job deliberately does NOT build an app binary. Real iOS/Android builds
  # happen on EAS (Expo's cloud build service), which needs signing credentials
  # and a macOS runner — don't try to produce an IPA here.
  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (eslint)
        run: npx expo lint

      # The app is TypeScript (the web frontend is not), so a type error is a
      # real build failure here — worth catching before the tests run.
      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  # Semgrep — framework-aware static analysis (Django/React/JS/Python + secret
  # detection). Complements CodeQL (see codeql.yml) with rules CodeQL doesn't
  # ship. Its own job so a finding here is easy to tell apart from a test
  # failure; a required check for branch protection on main.
  semgrep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Semgrep
        # Pin the version: an unpinned install is at the mercy of whatever landed
        # on PyPI. semgrep 1.170.0 shipped without a prebuilt manylinux wheel, so
        # pip built it from the sdist — which omits the compiled `semgrep-core`
        # binary — and every run died with "Failed to find semgrep-core". 1.169.0
        # ships the working wheel; bump deliberately once a later release is known
        # good.
        run: pip install semgrep==1.169.0

      - name: Run Semgrep
        run: >-
          semgrep scan --error --metrics off
          --config p/python --config p/django
          --config p/javascript --config p/react --config p/secrets
          --exclude migrations --exclude node_modules
          --exclude dist --exclude .venv
          backend frontend/src mobile/src
