# CI placeholder.
#
# The original template CI ran pytest against a `src/` package that no longer
# exists (removed in Phase 0). Real test suites get added *per phase* as we
# build features — backend tests with Django's test runner / pytest-django, and
# frontend tests with Vitest. This workflow just keeps CI green in the meantime
# and gives us a file to grow.
#
# TODO (future phases): replace the placeholder step with real jobs, e.g.
#   - backend:  uv sync && uv run python manage.py test
#   - frontend: npm ci && npm test
name: CI

on: [push, pull_request]

jobs:
  placeholder:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: No test suites yet
        run: |
          echo "No automated tests yet — real suites are added per phase."
          echo "See .github/workflows/main.yml for the plan."
