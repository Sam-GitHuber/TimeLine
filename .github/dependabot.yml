# Dependabot — watches our dependencies for known vulnerabilities and stale
# versions, and opens a PR (which the normal CI then runs against) to bump
# them. Grouped weekly so it's a digest, not a firehose.
#
# Three ecosystems, one per place we declare dependencies:
#   uv             — the Python backend (reads pyproject.toml + uv.lock)
#   npm            — the React frontend (package.json + package-lock.json)
#   github-actions — the action versions pinned in .github/workflows/*
version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
    # One combined PR for routine version bumps keeps the noise down; security
    # fixes still come through on their own regardless of this grouping.
    groups:
      backend-dependencies:
        patterns: ["*"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      frontend-dependencies:
        patterns: ["*"]
    # ESLint 10 is not adoptable yet: eslint-plugin-react's newest release
    # (7.37.5) still declares `peer eslint@"... || ^9.7"`, so `npm ci` fails
    # ERESOLVE on any tree containing both. Dependabot grouped that major in
    # with harmless patches, turning the whole weekly digest red (PR #107).
    # Ignoring only the *major* keeps 9.x patches and security fixes flowing.
    # Remove this once eslint-plugin-react ships ESLint 10 support — that same
    # release should also drop the vulnerable minimatch@3 → brace-expansion
    # chain that the `overrides` in frontend/package.json currently pins.
    ignore:
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns: ["*"]
